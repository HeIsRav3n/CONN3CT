apiVersion: apps/v1
kind: Deployment
metadata:
  name: conn3ct-pnl
  namespace: conn3ct-pnl
  labels:
    app: conn3ct-pnl
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conn3ct-pnl
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: conn3ct-pnl
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: conn3ct-pnl-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: conn3ct-pnl
          image: conn3ct-pnl:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: conn3ct-pnl-config
            - secretRef:
                name: conn3ct-pnl-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: logs
          emptyDir: {}
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["conn3ct-pnl"]
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: conn3ct-pnl-service
  namespace: conn3ct-pnl
spec:
  selector:
    app: conn3ct-pnl
  ports:
    - name: http
      port: 80
      targetPort: 3000
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: conn3ct-pnl-sa
  namespace: conn3ct-pnl
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: conn3ct-pnl-hpa
  namespace: conn3ct-pnl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: conn3ct-pnl
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
