global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: conn3ct-pnl

scrape_configs:
  - job_name: conn3ct-pnl-app
    static_configs:
      - targets: ['app:3000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
